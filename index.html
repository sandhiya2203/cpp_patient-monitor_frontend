<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SDC Medical Dashboard</title>

    <link rel="stylesheet" href="/style.css">

</head>


<body>


<div class="container">


<header>

    <h1>Medical Dashboard</h1>

    <p class="subtitle">
        IEEE 11073 SDC Based Patient Monitoring System
    </p>

</header>



<!-- Patient Information -->

<div class="patient-info">

<h2>Patient Information</h2>


<p>
<b>Name :</b>
<span id="patientName">--</span>
</p>


<p>
<b>Patient ID :</b>
<span id="patientId">--</span>
</p>


<p>
<b>Bed ID :</b>
<span id="bedId">--</span>
</p>


<p>
<b>Age :</b>
<span id="age">--</span>
</p>


<p>
<b>Gender :</b>
<span id="gender">--</span>
</p>


</div>




<!-- Status -->

<div class="status-box">

<b>Status :</b>

<span id="status">
Disconnected
</span>


</div>




<!-- Date Time -->


<div class="datetime">


<div>

<b>Date :</b>

<span id="date">
--
</span>


</div>



<div>

<b>Time :</b>

<span id="time">
--
</span>


</div>



</div>





<!-- Monitoring Cards -->


<div class="dashboard">



<div class="card">

<h2>
Heart Rate
</h2>


<div class="reading">

<span id="heart">
0
</span>

<small>
bpm
</small>


</div>


</div>





<div class="card">


<h2>
Blood Pressure
</h2>



<div class="reading">


<span id="bp">
0/0
</span>


<small>
mmHg
</small>


</div>


</div>





<div class="card">


<h2>
SpO₂
</h2>



<div class="reading">


<span id="spo2">
0
</span>


<small>
%
</small>


</div>


</div>




</div>






<footer>

Live Patient Monitoring Dashboard

</footer>



</div>



<script src="/script.js"></script>


</body>

</html>
